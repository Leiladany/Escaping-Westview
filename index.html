<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="stylesheet" href="style.css" />
    <title>Escaping Westview</title>
  </head>
  <body>
    <main class="app">
      <section class="screen screen-menu" id="menu-screen" aria-labelledby="menu-title">
        <div class="home-stage">
          <div class="home-copy">
            <h1 class="home-title" id="menu-title">Escaping Westview</h1>
            <p>
              Outrun Agatha's spells as Westview shifts around you and the magic
              closes in.
            </p>
            <button class="button-wanda" id="start-button" type="button">
              Start Game
            </button>
          </div>

          <div class="home-art" aria-hidden="true">
            <img
              src="./images/agatha/agatha.png"
              alt=""
              class="home-agatha"
            />
            <img
              src="./images/wanda/wanda-present.png"
              alt=""
              class="home-wanda"
            />
          </div>
        </div>
      </section>

      <section class="screen screen-game" id="game-screen" aria-label="Game" hidden>
        <div class="game-shell">
          <header class="game-topbar">
            <div class="game-brand">
              <span>Escaping Westview</span>
              <strong>Stay ahead of the hex</strong>
            </div>

            <div class="game-hud" aria-live="polite">
              <div class="hud-stat">
                <span>Seconds</span>
                <strong id="score-display">0s</strong>
              </div>
              <div class="hud-stat">
                <span>Best</span>
                <strong id="best-score-display">0s</strong>
              </div>
            </div>

            <button
              class="button-neutral sound-button"
              id="sound-button"
              type="button"
              aria-pressed="false"
            >
              Sound On
            </button>
          </header>

          <div class="game-playfield">
            <canvas id="game-canvas" width="1200" height="550">
              Escaping Westview needs a browser that supports canvas.
            </canvas>
          </div>

          <div class="touch-controls" aria-label="Movement controls">
            <button
              class="button-neutral"
              type="button"
              data-control="up"
              aria-label="Move up"
            >
              W
            </button>
            <div class="touch-controls-row">
              <button
                class="button-neutral"
                type="button"
                data-control="left"
                aria-label="Move left"
              >
                A
              </button>
              <button
                class="button-neutral"
                type="button"
                data-control="down"
                aria-label="Move down"
              >
                S
              </button>
              <button
                class="button-neutral"
                type="button"
                data-control="right"
                aria-label="Move right"
              >
                D
              </button>
            </div>
          </div>
        </div>
      </section>

      <section class="screen screen-game-over" id="game-over-screen" hidden>
        <div class="caught-stage">
          <h2>You Got Caught</h2>
          <div class="caught-results">
            <div class="caught-result">
              <span>Seconds</span>
              <strong id="final-time">0s</strong>
            </div>
          </div>
          <div class="game-over-actions">
            <button class="button-agatha" id="home-button" type="button">
              Home
            </button>
            <button class="button-wanda" id="restart-button" type="button">
              Restart
            </button>
            <button
              class="button-neutral sound-button caught-sound-button"
              id="caught-sound-button"
              type="button"
              aria-pressed="false"
            >
              Sound On
            </button>
          </div>
        </div>
      </section>
    </main>

    <script src="index.js"></script>
  </body>
</html>
